version: '3'

tasks:
  
  submodules:init:
    desc: "Initialize all submodules and download their content."
    cmds:
      - git submodule update --init --recursive
    status:
      - test -f ./tools/arch-tooling/Taskfile.yml
  
  submodules:sync:
    desc: "Update submodules to latest remote version."
    cmds:
      - echo "Обновляю инструменты..."
      - git submodule update --remote --merge
      - echo "Готово! Не забудь закоммитить обновление ссылки в проекте."
  
  submodules:push:
    desc: "Push project with all submodules to remote if they have any commits."
    cmds:
      - git push --recurse-submodules=on-demand

  submodules:status:
    desc: "Show status of every submodule."
    cmds:
      - git submodule status --recursive