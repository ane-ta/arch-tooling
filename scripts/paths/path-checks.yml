version: '3'

vars:
  CASE_ABS_PATH_REGEX: '{{if eq OS "windows"}}[a-zA-Z]:*{{else}}/*{{end}}'

tasks:

  is_abs:
    requires:
      vars: [CHECK_PATH]

    preconditions:
      - sh: |
          case '{{.CHECK_PATH}}' in
            {{.CASE_ABS_PATH_REGEX}}) exit 0 ;;
            *)               exit 1 ;;
          esac
        msg: |
          Критическая ошибка: Путь должен быть АБСОЛЮТНЫМ!
          Получен относительный путь: "{{.CHECK_PATH}}"

  is_rel:
    requires:
      vars: [CHECK_PATH]

    preconditions:
      - sh: |
          case '{{.CHECK_PATH}}' in
            {{.CASE_ABS_PATH_REGEX}}) exit 1 ;;
            *)               exit 0 ;;
          esac
        msg: |
          Критическая ошибка: Путь должен быть ОТНОСИТЕЛЬНЫМ!
          Получен абсолютный путь: "{{.CHECK_PATH}}"