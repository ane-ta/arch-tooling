version: '3'

tasks:
# =====================
  process_file:
    desc: "Process Org -> MD in pandoc"
    internal: true
    requires:
      vars: [SOURCE_FILE, DEST_FILE]
    preconditions:
      # Проверяем папку. Мы склеиваем корень запуска и переданный путь.
      - sh: test -f "{{.SOURCE_FILE}}"
        msg: "Ошибка: Файл не найден по пути: {{.SOURCE_FILE}}"
    cmds:
      - echo "Start processing org file..."
      - echo "from -> {{.SOURCE_FILE}}"
      - echo "to   -> {{.DEST_FILE}}"
      - pandoc "{{.SOURCE_FILE}}" -f org -t gfm+raw_html -o "{{.DEST_FILE}}" --wrap=none
      - task: post_process_file
        vars:
          DEST_FILE: '{{.DEST_FILE}}'
      - echo "-------------------"
     
  post_process_file:
    desc: "Post-process MD cleaning after pandoc"
    internal: true
    requires:
      vars: [DEST_FILE]
    cmds:
      - task: post_process_file_{{OS}}
        vars: 
          DEST_FILE: '{{.DEST_FILE}}'

  # Реализация для Linux (в Докере)
  post_process_file_linux:
    desc: "Post-process MD cleaning after pandoc for Linux"
    internal: true
    requires:
      vars: [DEST_FILE]
    cmds:
      - sed -i -E 's|\\<br/?\\>|<br>|g' "{{.DEST_FILE}}"   # \<br\> -> <br>
      - sed -i -E 's|\\\*|\*|g' "{{.DEST_FILE}}"           # \* -> *
    # -i: Изменяет файл на месте (in-place).
    # -E: Включает расширенные регулярные выражения.

    # s: заменить
    # /: будет символом разделителя в шаблоне
    # \\ \
    # () группа 1
    # <br текст
    # \/? возможный слэш
    # > текст
    # / разделитель.
    # \1 заменить на группу 1
    # / разделитель.
    # g: global — заменить все вхождения в строке, а не только первое.

  # Реализация для Windows (заглушка)
  post_process_file_windows:
    desc: "Post-process MD cleaning after pandoc for Windows"    
    internal: true
    requires:
      vars: [DEST_FILE]
    cmds:
      - echo "Локальная очистка на Windows не поддерживается. Используйте Docker."

# =====================
  render_tree_file:
    desc: "Process Org file -> MD file in tree"
    internal: true
    requires:
      vars: [SOURCE_FILE, SOURCE_ROOT, DEST_DIR]
    vars:
      # Получаем относительный хвост
      REL_SOURCE_FILE: '{{relPath .SOURCE_ROOT .SOURCE_FILE}}'
      # Меняем расширение
      REL_DEST_FILE: '{{replace ".org" ".md" .REL_SOURCE_FILE}}'
      # Путь к итоговому файлу
      DEST_FILE: '{{joinPath .DEST_DIR .REL_DEST_FILE}}'

    cmds:
      # Теперь mkdir -p создаст всё дерево папок внутри docs-result
      # - mkdir -p "{{.FINAL_DIR}}"
      - task: process_file
        vars:
          SOURCE_FILE: '{{.SOURCE_FILE}}'
          DEST_FILE: '{{.DEST_FILE}}'

# =====================
  render_tree:
    desc: "Process Org file tree -> MD file tree"
    # internal: true
    requires:
      vars: [SOURCE_DIR, DEST_DIR]
    preconditions:
      # Проверяем папку. Мы склеиваем корень запуска и переданный путь.
      - sh: test -d "{{.SOURCE_DIR}}"
        msg: "Ошибка: Директория не найдена по пути: {{.SOURCE_DIR}}"
      - sh: test -d "{{.DEST_DIR}}"
        msg: "Ошибка: Директория не найдена по пути: {{.DEST_DIR}}"
    vars:
      SOURCE_DIR: '{{.SOURCE_DIR}}'
      DEST_DIR: '{{.DEST_DIR}}'
    sources:
      - '{{joinPath .SOURCE_DIR "**/*.org"}}'
      - '{{joinPath .SOURCE_DIR "*.org"}}'
    generates:
      - '{{joinPath .DEST_DIR "**/*.md"}}'

    cmds:
      - |
        cat << EOF

        ----------------------------------------------------------------------------------
        -> Rendering org to md
        -> Source Root  - {{.SOURCE_DIR}}
        -> Dest Root    - {{.DEST_DIR}}
        ==================================================================================
        EOF
        #

      - echo "Found files.."
      - for: sources
        cmd: echo "{{.ITEM}}"
      - for: sources
        task: render_tree_file
        vars:
          SOURCE_FILE: '{{joinPath .TASK_DIR .ITEM}}'
          SOURCE_ROOT: '{{.SOURCE_DIR}}'
          DEST_DIR: '{{.DEST_DIR}}'


