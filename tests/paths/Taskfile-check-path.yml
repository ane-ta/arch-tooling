version: '3'

includes:
  path: 
    taskfile: ../../paths/path-checks.yml
  
  testing:
    taskfile: ../tests.yml

tasks:
#=================================
  path:check_is_abs:
    desc: 'Testing path:is_abs'
    cmds:
      - task: testing:assert_fail
        vars:
          LOG_CAPTION: '.'
          CLI_TASK_CMD: 'path:is_abs CHECK_PATH="."'

      - task: testing:assert_fail
        vars:
          LOG_CAPTION: '../'
          CLI_TASK_CMD: 'path:is_abs CHECK_PATH="../"'
      
      - task: testing:assert_fail
        vars:
          LOG_CAPTION: 'asd'
          CLI_TASK_CMD: 'path:is_abs CHECK_PATH="asd"'
      
      - task: path:check_is_abs_notwin
      - task: path:check_is_abs_win

  path:check_is_abs_notwin:
    platforms: [linux]
    internal: true
    cmds:
      - task: testing:assert_no_fail
        vars:
          LOG_CAPTION: '/asd'
          CLI_TASK_CMD: 'path:is_abs CHECK_PATH="/asd"'

  path:check_is_abs_win:
    platforms: [windows]
    internal: true
    cmds:
      - task: testing:assert_no_fail
        vars:
          LOG_CAPTION: "d:/"
          CLI_TASK_CMD: 'path:is_abs CHECK_PATH="d:/"'
        
      - task: testing:assert_no_fail
        vars:
          LOG_CAPTION: 'd:\\'
          CLI_TASK_CMD: 'path:is_abs CHECK_PATH="d:\\"'

      - task: testing:assert_fail
        vars:
          LOG_CAPTION: '/asd'
          CLI_TASK_CMD: 'path:is_abs CHECK_PATH="/asd"'

#=================================
  path:check_is_rel:
    desc: 'Testing path:is_rel'
    cmds:
      - task: testing:assert_no_fail
        vars:
          LOG_CAPTION: '.'
          CLI_TASK_CMD: 'path:is_rel CHECK_PATH="."'

      - task: testing:assert_no_fail
        vars:
          LOG_CAPTION: '../'
          CLI_TASK_CMD: 'path:is_rel CHECK_PATH="../"'
      
      - task: testing:assert_no_fail
        vars:
          LOG_CAPTION: 'asd'
          CLI_TASK_CMD: 'path:is_rel CHECK_PATH="asd"'
      
      - task: path:check_is_rel_fails_notwin
      - task: path:check_is_rel_fails_win

  path:check_is_rel_fails_notwin:
    platforms: [linux]
    internal: true
    cmds:
      - task: testing:assert_fail
        vars:
          LOG_CAPTION: '/asd'
          CLI_TASK_CMD: 'path:is_rel CHECK_PATH="/asd"'

  path:check_is_rel_fails_win:
    platforms: [windows]
    internal: true
    cmds:
      - task: testing:assert_fail
        vars:
          LOG_CAPTION: "d:/"
          CLI_TASK_CMD: 'path:is_rel CHECK_PATH="d:/"'
        
      - task: testing:assert_fail
        vars:
          LOG_CAPTION: 'd:\\'
          CLI_TASK_CMD: 'path:is_rel CHECK_PATH="d:\\"'

      - task: testing:assert_no_fail
        vars:
          LOG_CAPTION: '/asd'
          CLI_TASK_CMD: 'path:is_rel CHECK_PATH="/asd"'