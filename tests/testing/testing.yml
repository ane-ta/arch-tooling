version: '3'

env:
  CLI_TASK_FLAGS: 

tasks:
  echo-caption:
    internal: true
    desc: "Логировать конец предыдущего шага и заголовок следующего"
    requires:
      vars:
        [LOG_CAPTION]
    cmds:
      - echo ""
      - |
        {{if not (empty .LOG_CAPTION)}}
          echo ----------------------------------------------------------------------------------
          echo - "{{.LOG_CAPTION}}"
          echo ----------------------------------------------------------------------------------
        {{end}}      

  echo-tests-started:
    desc: "Логировать начало блока тестов"
    vars:
      LOG_CAPTION: "{{.LOG_CAPTION}}"
    cmds:
       - |
        cat << EOF
        
        ==================================================================================
        = {{.LOG_CAPTION}}. Tests started                                                                 
        ----------------------------------------------------------------------------------
        EOF
        #   

  echo-tests-passed:
    desc: "Логировать окончание блока тестов"
    vars:
      LOG_CAPTION: "{{.LOG_CAPTION}}"
    cmds:
       - |
        cat << EOF
        
        ----------------------------------------------------------------------------------
        -> {{.LOG_CAPTION}}. Tests passed                                                                 
        ==================================================================================
        
        EOF
        #   

  run-tests:
    internal: true
    requires:
      vars:
        [TESTS] # TESTS.CAPTION TESTS.TASK
   
    cmds:
      - for: { var: TESTS}
        task: run-test
        vars:
          CAPTION: "{{.ITEM.CAPTION}}"
          TASK: "{{.ITEM.TASK}}"
      
  run-test:
    internal: true
    requires:
      vars:
        [CAPTION, TASK]
    cmds:
      - task: echo-caption
        vars:
          LOG_CAPTION: '{{.CAPTION}}'

      - task: '{{.TASK}}'
  
  assert_that:
    internal: true
    requires:
      vars:
        [LOG_CAPTION, CLI_TASK_CMD, MUST_FAIL]
    vars:
      CLI_TASK: 'task {{.CLI_TASK_CMD}} {{.CLI_TASK_FLAGS}} {{if .CLI_SILENT}}--silent{{end}} {{if .CLI_FORCE}}--force{{end}}'
      MUST_FAIL: "{{.MUST_FAIL}}"
    cmds:
      - task: echo-caption
        vars:
          LOG_CAPTION: '{{if eq .MUST_FAIL "true"}}Must fail{{else}}Must pass{{end}} - {{.LOG_CAPTION}}'

      - |
        cat << EOF
        Running sh..
        - at  '{{.TASK_DIR}}'
        - cmd '{{.CLI_TASK}}'
        EOF
        #

      - |
        STATUS=0
        eval "{{.CLI_TASK}}" || STATUS=$?
        echo "RESULT STATUS: $STATUS"

        {{if eq .MUST_FAIL "true"}}
        if [ $STATUS -ne 0 ]; then
          echo "-> OK"
          exit 0
        else
          echo "-> ERROR: task didn't fail"
          exit 1 >&2
        fi
        {{else}}
        if [ $STATUS -ne 0 ]; then
          echo "-> ERROR: Task failed with code $STATUS"
          exit 1 >&2
        else
          echo "-> OK"
          exit 0
        fi
        {{end}}

  assert_no_fail:
    internal: true
    requires:
      vars:
        [LOG_CAPTION, CLI_TASK_CMD]
    cmds:
      - task: assert_that
        vars:
          LOG_CAPTION: "{{.LOG_CAPTION}}"
          CLI_TASK_CMD: "{{.CLI_TASK_CMD}}"
          MUST_FAIL: false

  assert_fail:
    internal: true
    requires:
      vars:
        [LOG_CAPTION, CLI_TASK_CMD]
    cmds:
      - task: assert_that
        vars:
          LOG_CAPTION: "{{.LOG_CAPTION}}"
          CLI_TASK_CMD: "{{.CLI_TASK_CMD}}"
          MUST_FAIL: true